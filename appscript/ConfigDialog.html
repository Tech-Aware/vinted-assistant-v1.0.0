<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Roboto, Arial, sans-serif; font-size: 13px; color: #202124; padding: 16px; }
    h2 { font-size: 16px; font-weight: 500; color: #1a73e8; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #5f6368; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; font-size: 13px; }
    .form-group input:focus, .form-group select:focus { border-color: #1a73e8; outline: none; }
    .form-group small { font-size: 11px; color: #80868b; margin-top: 2px; display: block; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 20px; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 12px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-cancel { background: #e8eaed; color: #3c4043; margin-left: 8px; }
    .status { margin-top: 10px; font-size: 12px; padding: 6px; border-radius: 4px; }
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-err { background: #fce4ec; color: #b71c1c; }
  </style>
</head>
<body>

  <h2>Configuration</h2>

  <div class="form-group">
    <label>Cle API Gemini</label>
    <input type="password" id="geminiApiKey" placeholder="AIzaSy...">
    <small>Obtenez votre cle sur <a href="https://aistudio.google.com/app/apikey" target="_blank">AI Studio</a></small>
  </div>

  <div class="form-group">
    <label>Modele Gemini</label>
    <select id="geminiModel">
      <option value="gemini-2.5-flash">gemini-2.5-flash (rapide)</option>
      <option value="gemini-2.5-pro-preview-05-06">gemini-2.5-pro (precis)</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash (economique)</option>
    </select>
  </div>

  <div class="form-group">
    <label>Cle API Cloud Vision (optionnel, pour OCR)</label>
    <input type="password" id="visionApiKey" placeholder="AIzaSy...">
    <small>Necessaire uniquement pour l'extraction OCR des etiquettes</small>
  </div>

  <div>
    <button class="btn btn-primary" onclick="saveConfig()">Enregistrer</button>
    <button class="btn btn-cancel" onclick="google.script.host.close()">Annuler</button>
  </div>

  <div id="status"></div>

  <script>
    // Charger la configuration existante
    google.script.run
      .withSuccessHandler(function(config) {
        if (config.geminiApiKey) document.getElementById('geminiApiKey').value = config.geminiApiKey;
        if (config.geminiModel) {
          var sel = document.getElementById('geminiModel');
          for (var i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === config.geminiModel) {
              sel.selectedIndex = i; break;
            }
          }
        }
        if (config.visionApiKey) document.getElementById('visionApiKey').value = config.visionApiKey;
      })
      .getConfig();

    function saveConfig() {
      var config = {
        geminiApiKey: document.getElementById('geminiApiKey').value.trim(),
        geminiModel: document.getElementById('geminiModel').value,
        visionApiKey: document.getElementById('visionApiKey').value.trim()
      };

      if (!config.geminiApiKey) {
        showStatus('Veuillez entrer une cle API Gemini.', 'err');
        return;
      }

      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showStatus('Configuration enregistree !', 'ok');
            setTimeout(function() { google.script.host.close(); }, 1000);
          } else {
            showStatus('Erreur lors de la sauvegarde.', 'err');
          }
        })
        .withFailureHandler(function(err) {
          showStatus('Erreur: ' + err.message, 'err');
        })
        .saveConfig(config);
    }

    function showStatus(msg, type) {
      var el = document.getElementById('status');
      el.className = 'status status-' + type;
      el.textContent = msg;
    }
  </script>

</body>
</html>
