<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', Roboto, Arial, sans-serif; font-size: 13px; color: #202124; padding: 12px; background: #fff; }
    h2 { font-size: 16px; font-weight: 500; color: #1a73e8; margin-bottom: 12px; }
    h3 { font-size: 13px; font-weight: 500; color: #5f6368; margin: 12px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    .section { background: #f8f9fa; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 11px; font-weight: 500; color: #5f6368; margin-bottom: 3px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 6px 8px; border: 1px solid #dadce0; border-radius: 4px; font-size: 12px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1a73e8; }
    .form-group textarea { resize: vertical; min-height: 40px; }

    .row { display: flex; gap: 8px; }
    .row .form-group { flex: 1; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s, opacity 0.2s; width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1557b0; }
    .btn-secondary { background: #e8eaed; color: #3c4043; }
    .btn-secondary:hover:not(:disabled) { background: #d2d6db; }
    .btn-success { background: #0d652d; color: #fff; margin-top: 6px; }
    .btn-success:hover:not(:disabled) { background: #0a5024; }

    .images-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 8px 0; }
    .img-item { position: relative; border-radius: 6px; overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: border-color 0.2s; }
    .img-item.selected { border-color: #1a73e8; }
    .img-item.ocr-selected { border-color: #f9ab00; }
    .img-item img { width: 100%; height: 80px; object-fit: cover; display: block; }
    .img-item .badge { position: absolute; top: 2px; right: 2px; background: #1a73e8; color: #fff; font-size: 9px; padding: 1px 4px; border-radius: 3px; }
    .img-item .badge-ocr { background: #f9ab00; color: #000; }
    .img-name { font-size: 9px; text-align: center; padding: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: rgba(0,0,0,0.04); }

    .result-box { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 10px; margin-top: 10px; }
    .result-box h3 { color: #2e7d32; }
    .result-title { font-size: 14px; font-weight: 500; color: #1b5e20; margin: 6px 0; word-break: break-word; }
    .result-desc { font-size: 12px; color: #33691e; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }

    .error-box { background: #fce4ec; border: 1px solid #ef9a9a; border-radius: 8px; padding: 10px; margin-top: 10px; color: #b71c1c; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar { font-size: 11px; color: #5f6368; text-align: center; padding: 4px; }

    .copy-btn { background: none; border: 1px solid #dadce0; border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: #1a73e8; margin-left: 6px; }
    .copy-btn:hover { background: #e8f0fe; }

    .toggle-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    .toggle-row input[type="checkbox"] { width: 14px; height: 14px; }
    .toggle-row label { font-size: 11px; color: #5f6368; }
  </style>
</head>
<body>

  <h2>Vinted Assistant</h2>

  <!-- Dossier Drive -->
  <div class="section">
    <h3>1. Dossier images</h3>
    <div class="form-group">
      <label>ID du dossier Google Drive</label>
      <input type="text" id="folderId" placeholder="Collez l'ID du dossier Drive ici">
    </div>
    <button class="btn btn-secondary" id="btnLoadImages" onclick="loadImages()">Charger les images</button>
  </div>

  <!-- Galerie images -->
  <div class="section" id="imagesSection" style="display:none;">
    <h3>2. Selectionner les images</h3>
    <p style="font-size:11px; color:#5f6368; margin-bottom:6px;">
      Clic = selectionner pour analyse | Double-clic = marquer pour OCR (jaune)
    </p>
    <div class="images-grid" id="imagesGrid"></div>
    <div class="status-bar" id="imagesStatus"></div>
  </div>

  <!-- Profil + Parametres -->
  <div class="section">
    <h3>3. Parametres</h3>
    <div class="form-group">
      <label>Profil d'analyse</label>
      <select id="profileName">
        <option value="jean_levis">Jean Levi's</option>
        <option value="pull">Pull / Gilet</option>
        <option value="jacket_carhart">Veste Carhartt</option>
      </select>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Taille FR</label>
        <input type="text" id="sizeFr" placeholder="ex: 40">
      </div>
      <div class="form-group">
        <label>Taille US</label>
        <input type="text" id="sizeUs" placeholder="ex: W30">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>SKU</label>
        <input type="text" id="sku" placeholder="ex: JLF123">
      </div>
      <div class="form-group">
        <label>Order ID</label>
        <input type="text" id="orderId" placeholder="ex: 42">
      </div>
    </div>

    <div class="form-group">
      <label>Composition (manuelle)</label>
      <input type="text" id="composition" placeholder="ex: Coton, Elasthanne">
    </div>

    <div class="row">
      <div class="form-group">
        <label>Genre</label>
        <select id="gender">
          <option value="">Auto (IA)</option>
          <option value="femme">Femme</option>
          <option value="homme">Homme</option>
        </select>
      </div>
      <div class="form-group">
        <label>Coupe (jean)</label>
        <select id="fit">
          <option value="">Auto (IA)</option>
          <option value="skinny">Skinny</option>
          <option value="droite">Droite</option>
          <option value="evasee">Evasee</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Taille (rise - jean)</label>
      <select id="riseType">
        <option value="">Auto (IA)</option>
        <option value="basse">Taille basse</option>
        <option value="moyenne">Taille moyenne</option>
        <option value="haute">Taille haute</option>
      </select>
    </div>
  </div>

  <!-- Bouton generation -->
  <button class="btn btn-primary" id="btnGenerate" onclick="generate()">
    Generer l'annonce
  </button>

  <!-- Resultat -->
  <div id="resultArea"></div>

  <script>
    var selectedImages = {};
    var ocrImages = {};
    var allImages = [];

    function loadImages() {
      var folderId = document.getElementById('folderId').value.trim();
      if (!folderId) { alert('Veuillez entrer un ID de dossier Drive.'); return; }

      document.getElementById('btnLoadImages').disabled = true;
      document.getElementById('btnLoadImages').textContent = 'Chargement...';

      google.script.run
        .withSuccessHandler(function(result) {
          document.getElementById('btnLoadImages').disabled = false;
          document.getElementById('btnLoadImages').textContent = 'Charger les images';

          if (result.error) { alert(result.error); return; }

          allImages = result.images || [];
          renderImages();
          document.getElementById('imagesSection').style.display = 'block';
        })
        .withFailureHandler(function(err) {
          document.getElementById('btnLoadImages').disabled = false;
          document.getElementById('btnLoadImages').textContent = 'Charger les images';
          alert('Erreur: ' + err.message);
        })
        .listImagesInFolder(folderId);
    }

    function renderImages() {
      var grid = document.getElementById('imagesGrid');
      grid.innerHTML = '';

      for (var i = 0; i < allImages.length; i++) {
        var img = allImages[i];
        var div = document.createElement('div');
        div.className = 'img-item';
        div.setAttribute('data-id', img.id);
        div.setAttribute('data-index', i);

        if (selectedImages[img.id]) div.classList.add('selected');
        if (ocrImages[img.id]) div.classList.add('ocr-selected');

        div.innerHTML = '<img src="' + img.thumbnailUrl + '" alt="' + img.name + '">' +
          (selectedImages[img.id] ? '<span class="badge">AI</span>' : '') +
          (ocrImages[img.id] ? '<span class="badge badge-ocr">OCR</span>' : '') +
          '<div class="img-name">' + img.name + '</div>';

        div.onclick = (function(id) {
          return function() { toggleImage(id); };
        })(img.id);

        div.ondblclick = (function(id) {
          return function(e) { e.preventDefault(); toggleOcr(id); };
        })(img.id);

        grid.appendChild(div);
      }

      updateImageStatus();
    }

    function toggleImage(id) {
      if (selectedImages[id]) delete selectedImages[id];
      else selectedImages[id] = true;
      renderImages();
    }

    function toggleOcr(id) {
      if (ocrImages[id]) delete ocrImages[id];
      else { ocrImages[id] = true; selectedImages[id] = true; }
      renderImages();
    }

    function updateImageStatus() {
      var selCount = Object.keys(selectedImages).length;
      var ocrCount = Object.keys(ocrImages).length;
      var status = selCount + ' image(s) selectionnee(s)';
      if (ocrCount > 0) status += ', ' + ocrCount + ' pour OCR';
      document.getElementById('imagesStatus').textContent = status;
    }

    function generate() {
      var imageFileIds = Object.keys(selectedImages);
      if (imageFileIds.length === 0) { alert('Selectionnez au moins une image.'); return; }

      var btn = document.getElementById('btnGenerate');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Generation en cours...';

      var params = {
        imageFileIds: imageFileIds,
        ocrImageFileIds: Object.keys(ocrImages),
        profileName: document.getElementById('profileName').value,
        uiData: {
          size_fr: document.getElementById('sizeFr').value.trim() || undefined,
          size_us: document.getElementById('sizeUs').value.trim() || undefined,
          sku: document.getElementById('sku').value.trim() || undefined,
          order_id: document.getElementById('orderId').value.trim() || undefined,
          composition: document.getElementById('composition').value.trim() || undefined,
          gender: document.getElementById('gender').value || undefined,
          fit: document.getElementById('fit').value || undefined,
          rise_type: document.getElementById('riseType').value || undefined
        }
      };

      // Clean undefined
      for (var key in params.uiData) {
        if (params.uiData[key] === undefined) delete params.uiData[key];
      }

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.innerHTML = 'Generer l\'annonce';
          showResult(result);
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.innerHTML = 'Generer l\'annonce';
          showError('Erreur: ' + err.message);
        })
        .generateListing(params);
    }

    function showResult(result) {
      var area = document.getElementById('resultArea');

      if (result.error) {
        area.innerHTML = '<div class="error-box"><strong>Erreur:</strong> ' + escapeHtml(result.error) + '</div>';
        return;
      }

      area.innerHTML =
        '<div class="result-box">' +
          '<h3>Resultat ' +
            '<button class="copy-btn" onclick="copyTitle()">Copier titre</button>' +
            '<button class="copy-btn" onclick="copyDesc()">Copier description</button>' +
          '</h3>' +
          '<div class="result-title" id="resultTitle">' + escapeHtml(result.title || '') + '</div>' +
          '<hr style="margin:8px 0; border-color:#a5d6a7;">' +
          '<div class="result-desc" id="resultDesc">' + escapeHtml(result.description || '') + '</div>' +
          '<button class="btn btn-success" onclick="saveToSheet()">Enregistrer dans la feuille</button>' +
        '</div>';

      // Store for save
      window._lastResult = result;
    }

    function showError(msg) {
      document.getElementById('resultArea').innerHTML =
        '<div class="error-box"><strong>Erreur:</strong> ' + escapeHtml(msg) + '</div>';
    }

    function copyTitle() {
      var el = document.getElementById('resultTitle');
      if (el) { copyToClipboard(el.textContent); }
    }

    function copyDesc() {
      var el = document.getElementById('resultDesc');
      if (el) { copyToClipboard(el.textContent); }
    }

    function copyToClipboard(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    function saveToSheet() {
      if (!window._lastResult) return;
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.error) alert('Erreur: ' + res.error);
          else alert('Enregistre a la ligne ' + res.row + ' !');
        })
        .withFailureHandler(function(err) { alert('Erreur: ' + err.message); })
        .writeResultToSheet(window._lastResult);
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
    }
  </script>

</body>
</html>
