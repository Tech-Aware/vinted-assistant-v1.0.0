<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinted Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>Vinted Assistant</h1>
    <span id="status-dot" class="status-dot offline" title="Déconnecté"></span>
  </header>

  <!-- Section: Images (fallback manuel, caché par défaut) -->
  <section class="section">
    <a href="#" id="toggle-manual-upload" class="manual-upload-link">ou charger des photos manuellement</a>
    <div id="manual-upload-section" hidden>
      <div id="drop-zone" class="drop-zone">
        <span class="drop-zone__text">Glisser des images ici ou</span>
        <button id="btn-add-images" class="btn btn--small" type="button">Parcourir</button>
        <input id="file-input" type="file" multiple accept="image/png,image/jpeg,image/webp" hidden>
      </div>
      <div id="thumbnails" class="thumbnails"></div>
    </div>
  </section>

  <!-- Section: Profil -->
  <section class="section">
    <label class="section-label" for="profile-select">Profil</label>
    <select id="profile-select" class="input">
      <option value="">-- Choisir --</option>
    </select>
  </section>

  <!-- Section: Champs dynamiques -->
  <section id="fields-section" class="section" hidden>
    <!-- Jean Levi's fields -->
    <div id="fields-jean_levis" class="profile-fields" hidden>
      <div class="field-row">
        <div class="field-group">
          <label>Taille FR *</label>
          <input id="size_fr" class="input input--sm" placeholder="42">
        </div>
        <div class="field-group">
          <label>Taille US</label>
          <input id="size_us" class="input input--sm" placeholder="W32">
        </div>
        <div class="field-group">
          <label>L</label>
          <input id="length" class="input input--sm" placeholder="32">
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label>Coupe</label>
          <select id="fit" class="input input--sm">
            <option value="">--</option>
            <option value="droite">Droite</option>
            <option value="evasee">Évasée</option>
            <option value="skinny">Skinny</option>
          </select>
        </div>
        <div class="field-group">
          <label>Taille (rise)</label>
          <select id="rise_type" class="input input--sm">
            <option value="">--</option>
            <option value="haute">Haute</option>
            <option value="moyenne">Moyenne</option>
            <option value="basse">Basse</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group field-group--full">
          <label>Composition</label>
          <input id="composition" class="input" placeholder="100% coton">
        </div>
      </div>
    </div>

    <!-- Pull fields -->
    <div id="fields-pull" class="profile-fields" hidden>
      <div class="field-row">
        <div class="field-group">
          <label>Mode de mesure</label>
          <select id="measurement_mode_pull" class="input input--sm">
            <option value="etiquette">Étiquette visible</option>
            <option value="mesures">Analyser les mesures</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Jacket Carhartt fields -->
    <div id="fields-jacket_carhart" class="profile-fields" hidden>
      <div class="field-row">
        <div class="field-group">
          <label>Taille FR</label>
          <input id="jk_size_fr" class="input input--sm" placeholder="42">
        </div>
        <div class="field-group">
          <label>Taille US</label>
          <input id="jk_size_us" class="input input--sm" placeholder="M">
        </div>
        <div class="field-group">
          <label>L</label>
          <input id="jk_length" class="input input--sm" placeholder="">
        </div>
      </div>
      <div class="field-row">
        <div class="field-group field-group--full">
          <label>Composition</label>
          <input id="jk_composition" class="input" placeholder="">
        </div>
      </div>
    </div>

    <!-- Polaire Outdoor fields -->
    <div id="fields-polaire_outdoor" class="profile-fields" hidden>
      <div class="field-row">
        <div class="field-group">
          <label>Mode de mesure</label>
          <select id="measurement_mode_polaire" class="input input--sm">
            <option value="etiquette">Étiquette visible</option>
            <option value="mesures">Analyser les mesures</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Champs communs -->
    <div class="field-row">
      <div class="field-group">
        <label>N° commande</label>
        <input id="order_id" class="input input--sm" placeholder="ex: 20">
      </div>
      <div class="field-group">
        <!-- Prix calculé automatiquement par le barème -->
      </div>
    </div>
    <div class="field-row">
      <label class="checkbox-label">
        <input id="has_defect" type="checkbox">
        <span>Présence de défaut</span>
      </label>
    </div>
  </section>

  <!-- Bouton Générer -->
  <section class="section">
    <button id="btn-generate" class="btn btn--primary btn--full" disabled>
      <span id="btn-generate-text">Générer</span>
      <span id="btn-generate-spinner" class="spinner" hidden></span>
    </button>
    <div id="status-message" class="status-message"></div>
  </section>

  <!-- Section: Panel de correction -->
  <section id="results-section" class="section" hidden>
    <label class="section-label">Corrections</label>

    <div class="result-card">
      <div class="result-header">
        <span class="section-label">Titre</span>
        <button class="btn btn--icon" id="btn-copy-title" title="Copier">📋</button>
      </div>
      <textarea id="result-title" class="result-text result-text--title"></textarea>
    </div>

    <div class="result-card">
      <div class="result-header">
        <span class="section-label">Description</span>
        <button class="btn btn--icon" id="btn-copy-desc" title="Copier">📋</button>
      </div>
      <textarea id="result-description" class="result-text result-text--desc"></textarea>
    </div>

    <div class="correction-fields">
      <div class="field-row">
        <div class="field-group">
          <label>Marque</label>
          <input id="edit-brand" class="input input--sm" placeholder="Marque">
        </div>
        <div class="field-group">
          <label>Taille</label>
          <input id="edit-size" class="input input--sm" placeholder="Taille">
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label>État</label>
          <select id="edit-condition" class="input input--sm">
            <option value="">--</option>
            <option value="Neuf">Neuf</option>
            <option value="Très bon état">Très bon état</option>
            <option value="Bon état">Bon état</option>
            <option value="Satisfaisant">Satisfaisant</option>
          </select>
        </div>
        <div class="field-group">
          <label>Couleur</label>
          <input id="edit-color" class="input input--sm" placeholder="Couleur">
        </div>
      </div>
      <div class="field-row">
        <div class="field-group field-group--full">
          <label>Matières</label>
          <input id="edit-materials" class="input" placeholder="Matières">
        </div>
      </div>
    </div>

    <div id="price-info" class="price-info" hidden>
      <div class="price-row">
        <span class="price-label">💰 Prix conseillé Vinted :</span>
        <span id="recommended-price" class="price-value"></span>
      </div>
      <div class="price-row">
        <span class="price-label">💵 Prix neuf en magasin :</span>
        <span id="retail-price" class="price-value price-value--muted"></span>
      </div>
    </div>

    <div class="result-meta">
      <span id="meta-time" class="meta-tag meta-tag--muted" hidden></span>
    </div>

    <button id="btn-fill" class="btn btn--accent btn--full">
      Appliquer les corrections
    </button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
